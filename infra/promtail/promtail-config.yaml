server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project"]
    relabel_configs:
      # 컨테이너 이름 라벨 (선행 슬래시 제거)
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container_name
      # Compose 서비스 이름 라벨
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      # job 라벨 고정
      - target_label: job
        replacement: docker
      # 모니터링 스택 제외: prometheus, grafana, alertmanager, node-exporter, postgres-exporter, redis-exporter, loki, promtail
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: (prometheus|grafana|alertmanager|node-exporter|postgres-exporter|redis-exporter|loki|promtail)
        action: drop
    pipeline_stages:
      # Docker JSON 로그 드라이버 파싱
      - docker: {}
      # nestjs-pino JSON 로그 파싱 (Bot/API 서버)
      - json:
          expressions:
            level: level
            msg: msg
            time: time
      # level 라벨 추가
      - labels:
          level:
      # 타임스탬프 추출 (pino 형식: epoch milliseconds)
      - timestamp:
          source: time
          format: UnixMs
          fallback_formats:
            - RFC3339
            - RFC3339Nano
