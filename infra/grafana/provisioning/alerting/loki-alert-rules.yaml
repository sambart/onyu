apiVersion: 1

groups:
  - orgId: 1
    name: loki-log-alerts
    folder: Onyu
    interval: 1m
    rules:
      - uid: high-error-log-rate
        title: HighErrorLogRate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300  # 5분
              to: 0
            datasourceUid: loki
            model:
              expr: 'sum(rate({compose_service=~"api|bot"} |= "ERROR" [5m]))'
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.1]
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API/Bot 에러 로그 발생률이 분당 0.1건을 초과하고 있습니다."

      - uid: discord-rate-limited
        title: DiscordRateLimited
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60  # 1분
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({compose_service="bot"} |= "rate limit" [1m])'
              refId: A
          - refId: C
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Bot이 Discord API Rate Limit에 걸렸습니다."
