services:
  # ─── Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/snippets:/etc/nginx/snippets:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
      grafana:
        condition: service_started
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: certbot-prod
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  # ─── Application ────────────────────────────────────────────
  api:
    container_name: onyu-api-prod
    image: ghcr.io/sambart/onyu/api:latest
    # ports: nginx 리버스 프록시를 통해 접근 — 외부 노출 불필요
    expose:
      - "3000"
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  bot:
    container_name: onyu-bot-prod
    image: ghcr.io/sambart/onyu/bot:latest
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - API_BASE_URL=http://api:3000
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  web:
    container_name: onyu-web-prod
    image: ghcr.io/sambart/onyu/web:latest
    # ports: nginx 리버스 프록시를 통해 접근 — 외부 노출 불필요
    expose:
      - "4000"
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # lavalink: 음악 기능 일시 중단 (YouTube API 정책 변경)
  # 복구 시 주석 해제
  # lavalink:
  #   container_name: lavalink-prod
  #   image: ghcr.io/lavalink-devs/lavalink:4
  #   volumes:
  #     - ./lavalink/application.yml:/opt/Lavalink/application.yml
  #   environment:
  #     - _JAVA_OPTIONS=-Xmx128m
  #     - YOUTUBE_OAUTH_REFRESH_TOKEN=${YOUTUBE_OAUTH_REFRESH_TOKEN:-}
  #   restart: unless-stopped

  db:
    image: postgres:15
    container_name: postgres-prod
    # ports: 외부 노출하지 않음 — 내부 네트워크에서만 접근
    # 디버깅 필요시: ports: ["127.0.0.1:5432:5432"]
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis-prod
    # ports: 외부 노출하지 않음 — 내부 네트워크에서만 접근
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Monitoring Stack ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-prod
    # ports: 외부 노출하지 않음 — Grafana에서 내부 접근
    volumes:
      - ./infra/prometheus:/etc/prometheus
      - prometheus_data_prod:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      api:
        condition: service_started
      bot:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-prod
    # ports: nginx 리버스 프록시를 통해 접근 — 외부 노출 불필요
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://monitoring.onyu.dev
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      - DISCORD_ALERT_WEBHOOK_URL=${DISCORD_ALERT_WEBHOOK_URL}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data_prod:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager-prod
    # ports: 외부 노출하지 않음
    environment:
      - DISCORD_ALERT_WEBHOOK_URL=${DISCORD_ALERT_WEBHOOK_URL}
    volumes:
      - ./infra/alertmanager:/etc/alertmanager-tmpl
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat /etc/alertmanager-tmpl/alertmanager.yml | sed "s|\$${DISCORD_ALERT_WEBHOOK_URL}|$$DISCORD_ALERT_WEBHOOK_URL|g" > /tmp/alertmanager.yml && \
        /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter-prod
    # ports: 외부 노출하지 않음
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres-exporter-prod
    # ports: 외부 노출하지 않음
    environment:
      DATA_SOURCE_NAME: "postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@db:5432/${DATABASE_NAME}?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: redis-exporter-prod
    # ports: 외부 노출하지 않음
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki-prod
    # ports: 외부 노출하지 않음 — 내부 네트워크에서만 접근
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data_prod:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail-prod
    volumes:
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data_prod:
    external: true
    name: nestjs-dhyunbot_postgres_data_prod
  redis_data_prod:
    external: true
    name: nestjs-dhyunbot_redis_data_prod
  prometheus_data_prod:
    external: true
    name: nestjs-dhyunbot_prometheus_data_prod
  grafana_data_prod:
    external: true
    name: nestjs-dhyunbot_grafana_data_prod
  loki_data_prod:
    external: true
    name: nestjs-dhyunbot_loki_data_prod
  certbot_www:
  certbot_conf:
