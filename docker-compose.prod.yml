services:
  # ─── Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/snippets:/etc/nginx/snippets:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: certbot-prod
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  # ─── Application ────────────────────────────────────────────
  api:
    container_name: onyu-api-prod
    image: ghcr.io/sambart/onyu/api:latest
    # ports: nginx 리버스 프록시를 통해 접근 — 외부 노출 불필요
    expose:
      - "3000"
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  bot:
    container_name: onyu-bot-prod
    image: ghcr.io/sambart/onyu/bot:latest
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - API_BASE_URL=http://api:3000
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  web:
    container_name: onyu-web-prod
    image: ghcr.io/sambart/onyu/web:latest
    # ports: nginx 리버스 프록시를 통해 접근 — 외부 노출 불필요
    expose:
      - "4000"
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: postgres-prod
    # ports: 외부 노출하지 않음 — 내부 네트워크에서만 접근
    # 디버깅 필요시: ports: ["127.0.0.1:5432:5432"]
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis-prod
    # ports: 외부 노출하지 않음 — 내부 네트워크에서만 접근
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data_prod:
    external: true
    name: nestjs-dhyunbot_postgres_data_prod
  redis_data_prod:
    external: true
    name: nestjs-dhyunbot_redis_data_prod
  certbot_www:
  certbot_conf:
