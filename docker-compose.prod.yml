services:
  api:
    container_name: onyu-api-prod
    image: ghcr.io/sambart/onyu/api:latest
    ports:
      - "3000:3000"
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  bot:
    container_name: onyu-bot-prod
    image: ghcr.io/sambart/onyu/bot:latest
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - API_BASE_URL=http://api:3000
      - LAVALINK_URL=lavalink:2333
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
    depends_on:
      api:
        condition: service_started
      lavalink:
        condition: service_started
    restart: unless-stopped

  web:
    container_name: onyu-web-prod
    image: ghcr.io/sambart/onyu/web:latest
    ports:
      - "4000:4000"
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  lavalink:
    container_name: lavalink-prod
    image: ghcr.io/lavalink-devs/lavalink:4
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml
    environment:
      - _JAVA_OPTIONS=-Xmx128m
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: postgres-prod
    # ports: 외부 노출하지 않음 — 내부 네트워크에서만 접근
    # 디버깅 필요시: ports: ["127.0.0.1:5432:5432"]
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis-prod
    # ports: 외부 노출하지 않음 — 내부 네트워크에서만 접근
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data_prod:
    external: true
    name: nestjs-dhyunbot_postgres_data_prod
  redis_data_prod:
    external: true
    name: nestjs-dhyunbot_redis_data_prod
