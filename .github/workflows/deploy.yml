name: Deploy to Lightsail

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/sambart/onyu/api
  BOT_IMAGE: ghcr.io/sambart/onyu/bot
  WEB_IMAGE: ghcr.io/sambart/onyu/web

jobs:
  version-bump:
    # [release] 커밋에 의한 재트리거 방지
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.version }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Calculate and apply version
        id: bump
        run: |
          VERSION=$(bash scripts/bump-version.sh)
          if [ "$VERSION" == "no-bump" ]; then
            echo "skipped=true" >> $GITHUB_OUTPUT
            echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
            echo "::notice::No version bump needed"
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT

            bash scripts/apply-version.sh "$VERSION"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json apps/api/package.json apps/web/package.json
            git commit -m "[release] v${VERSION} [skip ci]"
            git tag -f "v${VERSION}"
            git push origin main --tags --force
            echo "::notice::Bumped version to v${VERSION}"
          fi

  build-and-push:
    needs: version-bump
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile.prod
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:v${{ needs.version-bump.outputs.new_version }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/bot/Dockerfile.prod
          push: true
          tags: |
            ${{ env.BOT_IMAGE }}:latest
            ${{ env.BOT_IMAGE }}:${{ github.sha }}
            ${{ env.BOT_IMAGE }}:v${{ needs.version-bump.outputs.new_version }}
          cache-from: type=gha,scope=bot
          cache-to: type=gha,mode=max,scope=bot

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile.prod
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:v${{ needs.version-bump.outputs.new_version }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    runs-on: ubuntu-latest
    needs: [version-bump, build-and-push]

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/onyu
            DC="docker compose --env-file .env.prod -f docker-compose.prod.yml"
            API_IMG="ghcr.io/sambart/onyu/api"
            BOT_IMG="ghcr.io/sambart/onyu/bot"
            WEB_IMG="ghcr.io/sambart/onyu/web"

            # 1. 현재 :latest를 :prev로 백업 (롤백용)
            docker tag "${API_IMG}:latest" "${API_IMG}:prev" 2>/dev/null || true
            docker tag "${BOT_IMG}:latest" "${BOT_IMG}:prev" 2>/dev/null || true
            docker tag "${WEB_IMG}:latest" "${WEB_IMG}:prev" 2>/dev/null || true
            echo "=== 이전 이미지 :prev 태그 백업 완료 ==="

            # 2. 소스 업데이트 & 새 이미지 pull
            git pull origin main
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            $DC pull api bot web

            # 3. 새 컨테이너로 교체
            $DC up -d api bot web

            # 4. 헬스체크 함수 (최대 60초 대기)
            healthcheck() {
              local name=$1
              local port=$2
              local retries=15
              local wait=4

              for i in $(seq 1 $retries); do
                if curl -sf -o /dev/null --max-time 5 "http://localhost:${port}"; then
                  echo "=== $name health OK (attempt $i) ==="
                  return 0
                fi
                echo "=== $name health check $i/$retries failed, waiting ${wait}s... ==="
                sleep $wait
              done
              echo "=== $name health check FAILED after $retries attempts ==="
              return 1
            }

            # 5. 롤백 함수
            rollback() {
              echo "!!! 롤백 시작 !!!"
              docker tag "${API_IMG}:prev" "${API_IMG}:latest"
              docker tag "${BOT_IMG}:prev" "${BOT_IMG}:latest"
              docker tag "${WEB_IMG}:prev" "${WEB_IMG}:latest"
              $DC up -d api bot web
              echo "!!! 이전 버전으로 롤백 완료 !!!"
            }

            # 6. API 헬스체크
            if ! healthcheck "API" 3000; then
              echo "!!! API 헬스체크 실패 !!!"
              rollback
              exit 1
            fi

            # 7. Web 헬스체크
            if ! healthcheck "WEB" 4000; then
              echo "!!! Web 헬스체크 실패 !!!"
              rollback
              exit 1
            fi

            # 8. 헬스체크 통과 후 DB 마이그레이션
            echo "=== DB 마이그레이션 시작 ==="
            $DC exec api pnpm exec typeorm migration:run -d dist/apps/api/src/data-source.js

            # 9. 모니터링 볼륨 생성 (없으면 생성, 있으면 무시) 및 스택 재시작
            echo "=== 모니터링 스택 재시작 ==="
            for vol in prometheus_data_prod grafana_data_prod loki_data_prod; do
              docker volume create "nestjs-dhyunbot_${vol}" 2>/dev/null || true
            done
            $DC pull prometheus grafana loki promtail alertmanager node-exporter postgres-exporter redis-exporter 2>&1 || true
            $DC up -d --force-recreate prometheus grafana loki promtail alertmanager node-exporter postgres-exporter redis-exporter 2>&1 || true
            echo "=== 모니터링 컨테이너 상태 ==="
            $DC ps prometheus grafana loki promtail alertmanager node-exporter postgres-exporter redis-exporter 2>&1 || true

            # 10. 사용하지 않는 이미지 정리 (:prev 유지)
            docker image prune -f
            echo "=== 배포 완료 ==="
