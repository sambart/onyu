name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build shared
        run: pnpm --filter @onyu/shared build

      - name: Build API
        run: pnpm --filter @onyu/api build

      - name: Build Web
        run: pnpm --filter @onyu/web build
